<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu — Soluna Rooftop Sea View</title>
  <meta name="description" content="Full menu at Soluna — Tapas, Pinsa, Cocktails and Desserts. Rooftop Sea View, Armação de Pêra.">
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon-180.png">
  <meta name="theme-color" content="#1A1612">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --sol: #C8884A; --sol-lt: #E0A86A; --areia: #E8D5B7;
      --noite: #1A1612; --bruma: #241E18; --branco: #F8F4EE;
      --texto: #C8BCA8;
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans: 'DM Sans', sans-serif;
      --trans: 0.3s ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--noite);
      color: var(--branco);
      font-family: var(--font-sans);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    .menu-nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(26,22,18,0.96);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(200,136,74,0.15);
      padding: 0 clamp(20px,5vw,60px);
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .menu-nav-logo img { height: 36px; width: auto; opacity: 0.9; }
    .menu-nav-right { display: flex; align-items: center; gap: 12px; }
    .lang-pills { display: flex; gap: 4px; }
    .lang-pills a {
      font-family: var(--font-sans);
      font-size: 0.63rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid rgba(200,136,74,0.35);
      color: var(--areia);
      padding: 5px 10px;
      border-radius: 2px;
      transition: background var(--trans), color var(--trans), border-color var(--trans);
    }
    .lang-pills a.active,
    .lang-pills a:hover { background: var(--sol); border-color: var(--sol); color: var(--noite); }
    .back-link {
      font-family: var(--font-sans);
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--texto);
      border: 1px solid rgba(200,136,74,0.2);
      padding: 7px 16px;
      border-radius: 2px;
      transition: color var(--trans), border-color var(--trans);
      white-space: nowrap;
    }
    .back-link:hover { color: var(--sol); border-color: rgba(200,136,74,0.5); }
    .back-arrow { margin-right: 6px; opacity: 0.7; }
    .menu-hero {
      background: var(--bruma);
      border-bottom: 1px solid rgba(200,136,74,0.1);
      padding: clamp(32px,5vh,56px) clamp(20px,5vw,60px);
      text-align: center;
    }
    .menu-hero-label { font-size: 0.62rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--sol); margin-bottom: 10px; }
    .menu-hero-title { font-family: var(--font-serif); font-size: clamp(2rem,5vw,3.2rem); font-weight: 300; font-style: italic; color: var(--branco); margin-bottom: 8px; }
    .menu-hero-sub { font-size: 0.85rem; color: var(--texto); letter-spacing: 0.06em; }
    .menu-image-wrap { max-width: 760px; margin: clamp(32px,5vh,56px) auto; padding: 0 clamp(16px,4vw,40px); }
    .menu-image-wrap img { width: 100%; height: auto; border-radius: 4px; box-shadow: 0 24px 80px rgba(0,0,0,0.5); display: block; }
    .menu-bottom {
      border-top: 1px solid rgba(200,136,74,0.12);
      padding: clamp(24px,4vh,40px) clamp(20px,5vw,60px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
    }
    .menu-bottom-logo img { height: 32px; width: auto; opacity: 0.5; }
    .menu-contact { display: flex; gap: 24px; flex-wrap: wrap; }
    .menu-contact a { font-size: 0.75rem; letter-spacing: 0.1em; color: var(--texto); transition: color var(--trans); }
    .menu-contact a:hover { color: var(--sol); }
    .menu-reserve {
      font-family: var(--font-sans);
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: var(--sol);
      color: var(--noite);
      padding: 11px 24px;
      border-radius: 2px;
      transition: background var(--trans);
      white-space: nowrap;
    }
    .menu-reserve:hover { background: var(--sol-lt); }
    @media (max-width: 480px) {
      .menu-bottom { flex-direction: column; align-items: flex-start; }
      .menu-nav-right { gap: 8px; }
    }
  </style>
</head>
<body>

  <nav class="menu-nav" role="navigation" aria-label="Menu navigation">
    <a href="index.html" class="menu-nav-logo" aria-label="Back to Soluna">
      <img src="assets/logo-ivoire.png" alt="Soluna" width="100" height="64" loading="eager">
    </a>
    <div class="menu-nav-right">
      <div class="lang-pills" aria-label="Language">
        <a href="menu-pt.html">PT</a>
        <a href="menu-en.html" class="active" aria-current="page">EN</a>
        <a href="menu-fr.html">FR</a>
      </div>
      <a href="index.html#reservas" class="back-link">
        <span class="back-arrow" aria-hidden="true">←</span>Book
      </a>
    </div>
  </nav>

  <div class="menu-hero">
    <p class="menu-hero-label">Soluna · Rooftop Sea View</p>
    <h1 class="menu-hero-title">Our Menu</h1>
    <p class="menu-hero-sub">Armação de Pêra, Algarve · 2025</p>
  </div>

  <div class="menu-image-wrap">
    <img
      src="assets/menu-en.jpg"
      alt="Full menu at Soluna — Fish Tapas, Meat Tapas, Vegetarian Tapas, Pinsa and Desserts"
      width="800"
      loading="lazy">
  </div>

  <div class="menu-bottom">
    <div class="menu-bottom-logo">
      <a href="index.html" aria-label="Back to Soluna">
        <img src="assets/logo-ivoire.png" alt="Soluna" width="80" height="52" loading="lazy">
      </a>
    </div>
    <div class="menu-contact">
      <a href="tel:+351969344773">+351 969 344 773</a>
      <a href="mailto:soluna.algarve@gmail.com">soluna.algarve@gmail.com</a>
    </div>
    <a href="index.html#reservas" class="menu-reserve">Book a Table</a>
  </div>

</body>
</html>
